<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suggestions - Premier Institute</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --bg:     #f5ebe0;
    --card:   #fdf6ed;
    --border: #ddc9aa;
    --brown:  #6b3a1f;
    --brown2: #8c4e28;
    --gold:   #c9a97a;
    --text:   #2c1a0e;
    --text2:  #7a5230;
    --text3:  #a8835a;
    --shadow: rgba(107,58,31,0.13);
    --input:  #fdf6ed;
  }
  [data-theme="dark"] {
    --bg:     #17100a;
    --card:   #1e1510;
    --border: #3d2a18;
    --brown:  #c9a97a;
    --brown2: #e0bc8a;
    --gold:   #c9a97a;
    --text:   #f0e6d6;
    --text2:  #c9a97a;
    --text3:  #8c6a40;
    --shadow: rgba(0,0,0,0.4);
    --input:  #261a11;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 16px 48px;
    transition: background 0.3s, color 0.3s;
  }

  .theme-btn {
    position: fixed;
    top: 18px; right: 18px;
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--text2);
    font-size: 0.95rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s;
    z-index: 200;
  }
  .theme-btn:hover { background: var(--border); }

  header {
    text-align: center;
    margin-bottom: 28px;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--text);
    margin-bottom: 4px;
  }
  header h1 span { color: var(--gold); }
  header small {
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
    font-weight: 600;
  }

  .block {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 8px 32px var(--shadow);
    transition: background 0.3s, border-color 0.3s;
  }

  .block-label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 6px;
  }
  .block-label i { color: var(--gold); }

  .block h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--text);
    margin-bottom: 10px;
  }

  .block-note {
    font-size: 0.83rem;
    color: var(--text3);
    line-height: 1.55;
    margin-bottom: 22px;
    padding: 10px 14px;
    background: var(--bg);
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .block-note i { color: var(--gold); margin-right: 5px; }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }

  input, select, textarea {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--input);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    outline: none;
    transition: border-color 0.2s, background 0.3s;
    appearance: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--gold); }
  textarea { resize: vertical; min-height: 130px; }
  select { cursor: pointer; }
  input::placeholder, textarea::placeholder { color: var(--text3); }

  .submit-btn {
    margin-top: 6px;
    width: 100%;
    padding: 13px;
    background: var(--brown);
    color: #fdf6ed;
    border: none;
    border-radius: 11px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background 0.25s, transform 0.15s;
  }
  .submit-btn:hover { background: var(--brown2); transform: translateY(-1px); }
  [data-theme="dark"] .submit-btn { color: #17100a; }

  /* TOAST */
  .toast {
    position: fixed;
    top: 20px; left: 50%;
    transform: translateX(-50%) translateY(-80px);
    padding: 12px 22px;
    border-radius: 10px;
    font-size: 0.88rem;
    font-weight: 600;
    color: #fff;
    z-index: 9999;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    display: flex; align-items: center; gap: 8px;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: #2e7d32; }
  .toast.error   { background: #c0392b; }
</style>
</head>
<body>

  <button class="theme-btn" id="themeBtn">
    <i class="fa fa-moon" id="themeIcon"></i>
  </button>

  <header>
    <h1>Premier<span>Institute</span></h1>
    <small><i class="fa fa-lightbulb"></i> &nbsp; Suggestions</small>
  </header>

  <div class="block">
    <div class="block-label"><i class="fa fa-comment-dots"></i> Share Your Thoughts</div>
    <h2>Send a Suggestion</h2>
    <div class="block-note">
      <i class="fa fa-circle-info"></i>
      We value your suggestions,s. Please share suggestions with valid reasons. Do not try to outsmart the system — 
    </div>

    <form id="suggestionForm">
      <div class="field">
        <label><i class="fa fa-user" style="margin-right:5px;color:var(--gold)"></i> Your Name <span style="color:var(--text3);font-weight:400">(optional)</span></label>
        <input type="text" name="Name" placeholder="Enter your name">
      </div>

      <div class="field">
        <label><i class="fa fa-id-badge" style="margin-right:5px;color:var(--gold)"></i> You are?</label>
        <select name="Role" required>
          <option value="">Select your role</option>
          <option>Student</option>
          <option>Teacher</option>
          <option>Visitor</option>
          <option>Admin</option>
        </select>
      </div>

      <div class="field">
        <label><i class="fa fa-pen-to-square" style="margin-right:5px;color:var(--gold)"></i> Your Suggestion</label>
        <textarea name="Suggestion" maxlength="1000" required placeholder="Write your suggestion here..."></textarea>
      </div>

      <button type="submit" class="submit-btn">
        <i class="fa fa-paper-plane"></i> Submit Suggestion
      </button>
    </form>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // theme
    const root = document.documentElement;
    const themeIcon = document.getElementById('themeIcon');
    function applyTheme(t) {
      root.setAttribute('data-theme', t);
      themeIcon.className = t === 'dark' ? 'fa fa-sun' : 'fa fa-moon';
      localStorage.setItem('pi_theme', t);
    }
    applyTheme(localStorage.getItem('pi_theme') || 'light');
    document.getElementById('themeBtn').addEventListener('click', () => {
      applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    // toast
    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.innerHTML = `<i class="fa fa-${type === 'success' ? 'check-circle' : 'circle-xmark'}"></i> ${msg}`;
      t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 4000);
    }

    // form submit
    const form = document.getElementById("suggestionForm");
    form.addEventListener("submit", function(e) {
      e.preventDefault();
      const formData = new FormData(this);
      let message = "**💡 New Suggestion Received**\n\n";
      formData.forEach((v, k) => message += `**${k}:** ${v}\n`);

      fetch("https://discord.com/api/webhooks/1421051311012581398/vXpnuV__MgPYlsBq9kz6P4OSBNxFdq5cqYgoN07eobfh2P5EWVEkO_AoXv95HIBuK9L1", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content: message })
      }).then(() => {
        showToast("Suggestion submitted successfully!", "success");
        this.reset();
      }).catch(err => {
        showToast("Error sending suggestion. Try again.", "error");
        console.error(err);
      });
    });
  </script>
</body>
</html>

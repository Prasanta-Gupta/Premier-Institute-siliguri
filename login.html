<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premier Institute - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #f5ebe0;
      --card:     #fdf6ed;
      --border:   #ddc9aa;
      --brown:    #6b3a1f;
      --brown2:   #8c4e28;
      --gold:     #c9a97a;
      --text:     #2c1a0e;
      --text2:    #7a5230;
      --text3:    #a8835a;
      --input-bg: #fdf6ed;
      --shadow:   rgba(107,58,31,0.13);
      --error-bg: #c0392b;
      --success-bg:#2e7d32;
    }
    [data-theme="dark"] {
      --bg:       #17100a;
      --card:     #1e1510;
      --border:   #3d2a18;
      --brown:    #c9a97a;
      --brown2:   #e0bc8a;
      --gold:     #c9a97a;
      --text:     #f0e6d6;
      --text2:    #c9a97a;
      --text3:    #8c6a40;
      --input-bg: #261a11;
      --shadow:   rgba(0,0,0,0.4);
      --error-bg: #c0392b;
      --success-bg:#2e7d32;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 0.3s, color 0.3s;
      animation: fadeIn 0.8s ease;
    }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    /* theme toggle */
    .theme-btn {
      position: fixed;
      top: 18px; right: 18px;
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--text2);
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s;
      z-index: 200;
    }
    .theme-btn:hover { background: var(--border); }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 380px;
      padding: 38px 32px;
      box-shadow: 0 8px 40px var(--shadow);
      text-align: center;
      transition: background 0.3s, border-color 0.3s;
    }

    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      color: var(--text);
      margin-bottom: 2px;
    }
    .logo-text span { color: var(--gold); }

    .page-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 4px;
      font-family: 'DM Sans', monospace;
    }

    .motto {
      font-size: 0.85rem;
      color: var(--text3);
      font-style: italic;
      margin: 10px 0 26px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 24px;
    }

    .field { margin-bottom: 14px; text-align: left; }
    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 5px;
      letter-spacing: 0.3px;
    }
    .field input {
      width: 100%;
      padding: 11px 14px;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s, background 0.3s;
    }
    .field input:focus { border-color: var(--gold); }

    .remember {
      display: flex; align-items: center; gap: 8px;
      margin: 4px 0 20px;
      font-size: 0.85rem;
      color: var(--text2);
      cursor: pointer;
      text-align: left;
    }
    .remember input[type="checkbox"] { accent-color: var(--brown); width: 15px; height: 15px; cursor: pointer; }

    .login-btn {
      width: 100%;
      padding: 13px;
      background: var(--brown);
      color: #fdf6ed;
      border: none;
      border-radius: 11px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.25s, transform 0.15s;
      letter-spacing: 0.3px;
    }
    .login-btn:hover { background: var(--brown2); transform: translateY(-1px); }
    .login-btn:active { transform: translateY(0); }

    .loading {
      display: none;
      margin-top: 16px;
      font-size: 0.85rem;
      color: var(--text2);
      font-weight: 500;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .loading.show { display: flex; }
    .bubble {
      width: 8px; height: 8px;
      background: var(--gold);
      border-radius: 50%;
      animation: bounce 1s infinite;
    }
    .bubble:nth-child(2) { animation-delay: 0.2s; }
    .bubble:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,80%,100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    /* toast */
    .toast {
      position: fixed;
      top: 20px; left: 50%;
      transform: translateX(-50%) translateY(-80px);
      padding: 12px 22px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      color: #fff;
      z-index: 9999;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error   { background: var(--error-bg); }
    .toast.success { background: var(--success-bg); }
  </style>
</head>
<body>

  <button class="theme-btn" id="themeBtn" title="Toggle theme">🌙</button>

  <div class="card">
    <p class="page-label">Welcome Back</p>
    <div class="logo-text">Premier<span>Institute</span></div>
    <p class="motto">Empowering Knowledge, Building Future</p>
    <div class="divider"></div>

    <div class="field">
      <label>Mobile Number</label>
      <input type="text" id="number" placeholder="Enter your 10-digit number" maxlength="13">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password">
    </div>

    <label class="remember">
      <input type="checkbox" id="rememberMe"> Keep me logged in
    </label>

    <button class="login-btn" onclick="login()">Log In</button>
    <div class="loading" id="loading">
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      Logging in...
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
  // theme
  const root = document.documentElement;
  const themeBtn = document.getElementById('themeBtn');
  function applyTheme(t) {
    root.setAttribute('data-theme', t);
    themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('pi_theme', t);
  }
  applyTheme(localStorage.getItem('pi_theme') || 'light');
  themeBtn.addEventListener('click', () => {
    applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });

  // toast
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // auto login
  window.onload = function() {
    const savedUser = JSON.parse(localStorage.getItem("currentUser"));
    const expiry = localStorage.getItem("loginExpiry");
    if (savedUser && expiry && Date.now() < parseInt(expiry)) {
      window.location.href = "ban.html";
    }
  };

  const JSON_BIN_ID = "68d5789ed0ea881f408ad215";
  const MASTER_KEY  = "$2a$10$5TyPwxtO8pS6G5qBROpTx.PX3NTZx3bg/W6cnelH2J5Qzyfz27ZA.";

  async function login() {
    let number   = document.getElementById("number").value.trim();
    const password = document.getElementById("password").value.trim();
    const remember = document.getElementById("rememberMe").checked;

    if (!number || !password) { showToast("Please fill in all fields.", "error"); return; }

    if (number.startsWith("+91") && number.length === 13) {
      number = number.slice(3);
      document.getElementById("number").value = number;
    }
    if (!/^[0-9]{10}$/.test(number)) { showToast("Enter a valid 10-digit number.", "error"); return; }

    document.getElementById("loading").classList.add("show");

    try {
      const response = await fetch(`https://api.jsonbin.io/v3/b/${JSON_BIN_ID}/latest`, {
        headers: { "X-Master-Key": MASTER_KEY }
      });
      const data = await response.json();
      const users = data.record.users || [];

      const user = users.find(u =>
        u.Number === number &&
        u.Password.toLowerCase() === password.toLowerCase()
      );

      if (user) {
        const expiry = remember
          ? Date.now() + 7 * 24 * 60 * 60 * 1000
          : Date.now() + 24 * 60 * 60 * 1000;
        localStorage.setItem("currentUser", JSON.stringify(user));
        localStorage.setItem("loginExpiry", expiry.toString());
        showToast("Login successful!", "success");
        setTimeout(() => { window.location.href = "page1.html"; }, 1200);
      } else {
        showToast("Wrong number or password.", "error");
        document.getElementById("loading").classList.remove("show");
      }
    } catch (err) {
      console.error(err);
      showToast("Something went wrong. Try again.", "error");
      document.getElementById("loading").classList.remove("show");
    }
  }
</script>
</body>
</html>

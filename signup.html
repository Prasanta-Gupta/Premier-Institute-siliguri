<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premier Institute - Signup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --cream:       #fdf6ed;
      --cream2:      #f5ebe0;
      --cream3:      #ede0cc;
      --gold:        #c9a97a;
      --gold2:       #b8935f;
      --brown:       #6b3a1f;
      --brown2:      #8c4e28;
      --brown-dark:  #3b1f0a;
      --text:        #2c1a0e;
      --text2:       #7a5230;
      --text3:       #a8835a;
      --border:      #ddc9aa;
      --shadow:      rgba(107,58,31,0.12);
      --bg:          #f5ebe0;
      --card:        #fdf6ed;
    }
    [data-theme="dark"] {
      --cream:       #1e1510;
      --cream2:      #261a11;
      --cream3:      #2e2016;
      --gold:        #c9a97a;
      --gold2:       #b8935f;
      --brown:       #c9a97a;
      --brown2:      #e0bc8a;
      --brown-dark:  #f5ebe0;
      --text:        #f0e6d6;
      --text2:       #c9a97a;
      --text3:       #8c6a40;
      --border:      #3d2a18;
      --shadow:      rgba(0,0,0,0.4);
      --bg:          #17100a;
      --card:        #1e1510;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background 0.4s, color 0.4s;
      overflow-x: hidden;
      animation: fadeIn 0.6s ease;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* TOPBAR */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; height: 62px;
      backdrop-filter: blur(16px);
      transition: background 0.4s, border-color 0.4s;
    }
    .topbar-brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem; font-weight: 700;
      color: var(--brown-dark);
      letter-spacing: 0.3px;
      text-decoration: none;
      transition: color 0.4s;
    }
    .topbar-brand span { color: var(--gold2); }
    .theme-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--cream2);
      color: var(--text2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem;
      transition: all 0.3s;
    }
    .theme-btn:hover { background: var(--cream3); color: var(--brown); }

    /* CARD */
    .card {
      position: relative; z-index: 1;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      width: min(400px, 92vw);
      box-shadow: 0 12px 48px var(--shadow);
      text-align: center;
      margin-top: 62px;
      transition: background 0.4s, border-color 0.4s;
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--gold2);
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem; font-weight: 700;
      color: var(--brown-dark);
      line-height: 1.2;
      margin-bottom: 4px;
      transition: color 0.4s;
    }
    h1 em { font-style: italic; color: var(--gold2); }

    .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--text3);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .motto {
      font-size: 0.88rem;
      color: var(--text2);
      font-style: italic;
      margin-bottom: 28px;
      line-height: 1.55;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 0 24px;
      transition: background 0.4s;
    }

    /* INPUTS */
    .field-label {
      font-size: 0.7rem; font-family: 'DM Mono', monospace;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--text3); margin-bottom: 5px;
      display: block; text-align: left;
    }
    .input-wrap {
      position: relative;
      margin-bottom: 14px;
    }
    .input-wrap i {
      position: absolute;
      left: 13px; top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      font-size: 0.85rem;
      pointer-events: none;
    }
    .rx-input {
      width: 100%;
      padding: 11px 14px 11px 36px;
      background: var(--cream2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      outline: none;
      transition: border 0.2s, background 0.4s;
    }
    .rx-input:focus { border-color: var(--gold); background: var(--cream); }
    .rx-input::placeholder { color: var(--text3); }

    /* BUTTON */
    .rx-btn {
      width: 100%; padding: 13px;
      background: var(--brown); color: #fdf6ed;
      border: none; border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 16px var(--shadow);
      transition: background 0.2s, transform 0.15s;
      margin-top: 8px;
    }
    .rx-btn:hover { background: var(--brown2); transform: translateY(-2px); }
    [data-theme="dark"] .rx-btn { background: var(--gold2); color: #1e1510; }
    [data-theme="dark"] .rx-btn:hover { background: var(--brown2); }

    /* LOADING */
    .loading {
      display: none;
      margin-top: 18px;
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      color: var(--text2);
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .loading.show { display: flex; }
    .bubble {
      width: 8px; height: 8px;
      background: var(--gold2);
      border-radius: 50%;
      animation: bounce 1s infinite;
    }
    .bubble:nth-child(2) { animation-delay: 0.2s; }
    .bubble:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40%           { transform: scale(1); }
    }

    /* LOGIN LINK */
    .login-link {
      margin-top: 20px;
      font-size: 0.82rem;
      color: var(--text3);
    }
    .login-link a {
      color: var(--gold2);
      font-weight: 600;
      text-decoration: none;
    }
    .login-link a:hover { color: var(--brown); }

    /* ERROR TOAST */
    .error-toast {
      position: fixed;
      top: 80px; right: -360px;
      background: var(--card);
      border: 1.5px solid #e05555;
      border-left: 4px solid #e05555;
      color: var(--text);
      padding: 12px 18px;
      border-radius: 12px 0 0 12px;
      font-size: 0.85rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      box-shadow: 0 4px 20px var(--shadow);
      transition: right 0.45s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 9999;
      display: flex; align-items: center; gap: 10px;
      max-width: 300px;
    }
    .error-toast i { color: #e05555; flex-shrink: 0; }
    .error-toast.show { right: 0; }

    @media (max-width: 480px) {
      .card { padding: 32px 20px; }
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <nav class="topbar">
    <a href="index.html" class="topbar-brand">Premier<span>Institute</span></a>
    <button class="theme-btn" id="themeBtn" title="Toggle theme">
      <i class="fa fa-moon" id="themeIcon"></i>
    </button>
  </nav>

  <!-- CARD -->
  <div class="card">
    <p class="eyebrow"><i class="fa fa-user-plus"></i> &nbsp;Create Account</p>
    <h1>Join <em>Premier</em></h1>
    <p class="subtitle">By Prashant Gupta</p>
    <p class="motto">Empowering education with dedication and innovation.</p>

    <div class="divider"></div>

    <div class="input-wrap">
      <i class="fa fa-user"></i>
      <input type="text" id="name" class="rx-input" placeholder="Full Name" required>
    </div>
    <div class="input-wrap">
      <i class="fa fa-graduation-cap"></i>
      <input type="text" id="class" class="rx-input" placeholder="Class (e.g. X, XII)" required>
    </div>
    <div class="input-wrap">
      <i class="fa fa-phone"></i>
      <input type="text" id="number" class="rx-input" placeholder="Mobile Number (10 digits)" required>
    </div>
    <div class="input-wrap">
      <i class="fa fa-lock"></i>
      <input type="password" id="password" class="rx-input" placeholder="Set Password" required>
    </div>

    <button class="rx-btn" onclick="signup()">
      <i class="fa fa-user-plus"></i> Sign Up
    </button>

    <div class="loading" id="loading">
      Signing up
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
    </div>

    <p class="login-link">Already have an account? <a href="login.html">Login</a></p>
  </div>

  <!-- ERROR TOAST -->
  <div id="errorBox" class="error-toast">
    <i class="fa fa-exclamation-circle"></i>
    <span id="errorText"></span>
  </div>

  <script>
    // THEME
    const root = document.documentElement;
    const themeIcon = document.getElementById('themeIcon');
    function applyTheme(t) {
      root.setAttribute('data-theme', t);
      themeIcon.className = t === 'dark' ? 'fa fa-sun' : 'fa fa-moon';
      localStorage.setItem('pi_theme', t);
    }
    applyTheme(localStorage.getItem('pi_theme') || 'light');
    document.getElementById('themeBtn').addEventListener('click', () => {
      applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    // ERROR TOAST
    function showError(message) {
      const box = document.getElementById("errorBox");
      document.getElementById("errorText").textContent = message;
      box.classList.add("show");
      setTimeout(() => box.classList.remove("show"), 3000);
    }

    // SIGNUP LOGIC (unchanged)
    const JSON_BIN_ID = "68d5789ed0ea881f408ad215";
    const MASTER_KEY  = "$2a$10$5TyPwxtO8pS6G5qBROpTx.PX3NTZx3bg/W6cnelH2J5Qzyfz27ZA.";

    async function signup() {
      const name     = document.getElementById("name").value.trim();
      const cls      = document.getElementById("class").value.trim();
      let   number   = document.getElementById("number").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!name || !cls || !number || !password) {
        showError("All fields are required."); return;
      }
      number = number.replace(/\s+/g, "");
      const phoneRegex = /^[6-9][0-9]{9}$/;
      if (!phoneRegex.test(number)) {
        showError("Enter a valid 10-digit Indian mobile number."); return;
      }

      document.getElementById("loading").classList.add("show");

      try {
        const response = await fetch(`https://api.jsonbin.io/v3/b/${JSON_BIN_ID}/latest`, {
          headers: { "X-Master-Key": MASTER_KEY }
        });
        let data = await response.json();
        if (!data.record || !Array.isArray(data.record.users)) {
          data = { record: { users: [] } };
        }

        const exists = data.record.users.find(
          u => u.Name.toLowerCase() === name.toLowerCase() ||
               u.Number === number ||
               u.Password === password
        );
        if (exists) {
          document.getElementById("loading").classList.remove("show");
          if (exists.Name.toLowerCase() === name.toLowerCase()) showError("Username already taken.");
          else if (exists.Number === number) showError("Number already taken.");
          else if (exists.Password === password) showError("Password already taken.");
          return;
        }

        const userData = {
          Name: name, Class: cls, Number: number, Password: password,
          DateOfJoin: new Date().toISOString().split("T")[0], Role: "N/A"
        };
        data.record.users.push(userData);

        await fetch(`https://api.jsonbin.io/v3/b/${JSON_BIN_ID}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY },
          body: JSON.stringify({ users: data.record.users })
        });

        localStorage.setItem("currentUser", JSON.stringify(userData));

        setTimeout(() => {
          document.getElementById("loading").classList.remove("show");
          window.location.href = "ban.html";
        }, 1500);

      } catch (err) {
        console.error("Error saving data:", err);
        showError("Signup failed. Please try again.");
        document.getElementById("loading").classList.remove("show");
      }
    }
  </script>
</body>
</html>

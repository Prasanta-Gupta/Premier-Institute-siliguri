<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premier Institute — Global Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --cream:      #fdf6ed;
      --cream2:     #f5ebe0;
      --cream3:     #ede0cc;
      --gold:       #c9a97a;
      --gold2:      #b8935f;
      --brown:      #6b3a1f;
      --brown2:     #8c4e28;
      --brown-dark: #3b1f0a;
      --text:       #2c1a0e;
      --text2:      #7a5230;
      --text3:      #a8835a;
      --border:     #ddc9aa;
      --shadow:     rgba(107,58,31,0.12);
      --bg:         #f5ebe0;
      --card:       #fdf6ed;
    }
    [data-theme="dark"] {
      --cream:      #1e1510;
      --cream2:     #261a11;
      --cream3:     #2e2016;
      --gold:       #c9a97a;
      --gold2:      #b8935f;
      --brown:      #c9a97a;
      --brown2:     #e0bc8a;
      --brown-dark: #f5ebe0;
      --text:       #f0e6d6;
      --text2:      #c9a97a;
      --text3:      #8c6a40;
      --border:     #3d2a18;
      --shadow:     rgba(0,0,0,0.4);
      --bg:         #17100a;
      --card:       #1e1510;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.4s, color 0.4s;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.4;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: relative; z-index: 200;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; height: 62px;
      flex-shrink: 0;
      transition: background 0.4s, border-color 0.4s;
    }
    .topbar-left  { display: flex; align-items: center; gap: 10px; }
    .topbar-brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem; font-weight: 700;
      color: var(--brown-dark); transition: color 0.4s;
    }
    .topbar-brand span { color: var(--gold2); }
    .topbar-right { display: flex; gap: 8px; align-items: center; }

    .icon-btn {
      width: 38px; height: 38px; border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--cream2); color: var(--text2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.88rem; transition: all 0.25s;
      text-decoration: none; flex-shrink: 0;
    }
    .icon-btn:hover { background: var(--cream3); color: var(--brown); border-color: var(--gold); }

    /* online dot */
    .online-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #3dbb6a;
      display: inline-block;
      box-shadow: 0 0 0 2px #3dbb6a33;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 2px #3dbb6a33; }
      50%      { box-shadow: 0 0 0 5px #3dbb6a22; }
    }
    .online-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem; color: var(--text3);
      display: flex; align-items: center; gap: 5px;
    }

    /* ── NAME EDIT DROPDOWN ── */
    .name-dropdown {
      position: absolute;
      top: 68px; right: 60px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      width: 220px;
      box-shadow: 0 8px 32px var(--shadow);
      z-index: 300;
      display: none;
      transition: background 0.4s;
    }
    .name-dropdown.open { display: block; animation: dropDown 0.2s ease; }
    @keyframes dropDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .name-dropdown label {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text3);
      display: block; margin-bottom: 6px;
    }
    .name-dropdown .rx-input {
      width: 100%; padding: 10px 12px;
      background: var(--cream2);
      border: 1.5px solid var(--border);
      border-radius: 9px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
      outline: none; margin-bottom: 10px;
      transition: border 0.2s;
    }
    .name-dropdown .rx-input:focus { border-color: var(--gold); }
    .name-dropdown .rx-btn {
      width: 100%; padding: 10px;
      background: var(--brown); color: #fdf6ed;
      border: none; border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .name-dropdown .rx-btn:hover { background: var(--brown2); }
    [data-theme="dark"] .name-dropdown .rx-btn { background: var(--gold2); color: #1e1510; }

    /* ── CHAT AREA ── */
    #chatContainer {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative; z-index: 1;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    #chatContainer::-webkit-scrollbar { width: 5px; }
    #chatContainer::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── MESSAGES ── */
    .message {
      padding: 10px 14px;
      border-radius: 14px;
      max-width: 78%;
      line-height: 1.45;
      border: 1.5px solid var(--border);
      background: var(--card);
      box-shadow: 0 2px 8px var(--shadow);
      animation: msgIn 0.25s ease;
      word-break: break-word;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.self {
      background: var(--brown);
      color: #fdf6ed;
      border-color: var(--brown2);
      margin-left: auto;
    }
    [data-theme="dark"] .message.self {
      background: var(--gold2);
      color: #1e1510;
      border-color: var(--gold);
    }

    .message.system {
      background: var(--cream2);
      border-color: var(--border);
      border-style: dashed;
      font-style: italic;
      color: var(--text3);
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      text-align: center;
      margin: 0 auto;
      max-width: 90%;
    }

    .message.moderation {
      background: #fdf4dc;
      border-color: var(--gold);
      border-left: 4px solid var(--gold2);
      color: var(--text2);
      font-size: 0.85rem;
      margin: 0 auto;
      max-width: 90%;
    }
    [data-theme="dark"] .message.moderation {
      background: #2a2000; color: #d4aa30; border-color: #4a3800;
    }

    .meta {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--text3);
      margin-bottom: 4px;
      display: flex; align-items: center; gap: 5px;
    }
    .message.self .meta { color: rgba(253,246,237,0.65); }
    [data-theme="dark"] .message.self .meta { color: rgba(30,21,16,0.6); }

    .msg-text { font-size: 0.9rem; }

    /* ── FORM ── */
    .chat-form {
      position: relative; z-index: 2;
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px;
      background: var(--card);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      transition: background 0.4s, border-color 0.4s;
    }
    .chat-form input {
      flex: 1; padding: 11px 16px;
      background: var(--cream2);
      border: 1.5px solid var(--border);
      border-radius: 24px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.92rem;
      outline: none; transition: border 0.2s, background 0.4s;
    }
    .chat-form input:focus { border-color: var(--gold); background: var(--cream); }
    .chat-form input::placeholder { color: var(--text3); }
    .chat-form button {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--brown); color: #fdf6ed;
      border: none; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem;
      box-shadow: 0 4px 12px var(--shadow);
      transition: background 0.2s, transform 0.15s;
    }
    .chat-form button:hover { background: var(--brown2); transform: scale(1.08); }
    [data-theme="dark"] .chat-form button { background: var(--gold2); color: #1e1510; }

    /* ── NAME MODAL (custom prompt) ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
      z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 22px;
      padding: 36px 30px;
      width: min(420px, 100%);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
      text-align: center;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    .modal-icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: var(--cream2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; color: var(--gold2);
      margin: 0 auto 18px;
    }
    .modal-box h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem; color: var(--brown-dark);
      margin-bottom: 6px;
    }
    .modal-box h2 em { font-style: italic; color: var(--gold2); }
    .modal-box p {
      font-size: 0.82rem; color: var(--text3);
      margin-bottom: 22px; line-height: 1.5;
      font-family: 'DM Mono', monospace;
    }
    .modal-input-wrap { position: relative; margin-bottom: 8px; }
    .modal-input-wrap i {
      position: absolute; left: 13px; top: 50%;
      transform: translateY(-50%);
      color: var(--text3); font-size: 0.82rem; pointer-events: none;
    }
    .modal-input {
      width: 100%; padding: 12px 14px 12px 36px;
      background: var(--cream2);
      border: 1.5px solid var(--border);
      border-radius: 11px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
      outline: none; transition: border 0.2s, background 0.4s;
      text-align: left;
    }
    .modal-input:focus { border-color: var(--gold); background: var(--cream); }
    .modal-input::placeholder { color: var(--text3); }
    .modal-hint {
      font-size: 0.72rem; color: var(--text3);
      font-family: 'DM Mono', monospace;
      margin-bottom: 18px; display: block;
      text-align: left;
    }
    .modal-error {
      font-size: 0.78rem; color: #e05555;
      font-family: 'DM Mono', monospace;
      margin-bottom: 12px; display: none;
      text-align: left;
      background: #fde8e8; border-radius: 8px;
      padding: 8px 12px;
      border: 1px solid #e0a0a0;
    }
    [data-theme="dark"] .modal-error { background: #2a0a0a; color: #e07070; border-color: #4a1a1a; }
    .modal-error.show { display: block; }
    .modal-btn {
      width: 100%; padding: 13px;
      background: var(--brown); color: #fdf6ed;
      border: none; border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 16px var(--shadow);
      transition: background 0.2s, transform 0.15s;
    }
    .modal-btn:hover { background: var(--brown2); transform: translateY(-1px); }
    [data-theme="dark"] .modal-btn { background: var(--gold2); color: #1e1510; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 76px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 12px; padding: 10px 18px;
      font-family: 'DM Mono', monospace; font-size: 0.78rem;
      color: var(--text2);
      box-shadow: 0 8px 24px var(--shadow);
      opacity: 0; pointer-events: none;
      transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap; z-index: 500;
      display: flex; align-items: center; gap: 8px;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: #e05555; color: #8b1a1a; background: #fde8e8; }
    [data-theme="dark"] .toast.error { background: #2a0a0a; color: #e07070; }

    @media (max-width: 480px) {
      .topbar { padding: 0 12px; }
      .chat-form { padding: 10px 12px; }
      .name-dropdown { right: 12px; width: 200px; }
    }
  </style>
</head>
<body>

  <!-- NAME MODAL -->
  <div class="modal-overlay" id="nameModal">
    <div class="modal-box">
      <div class="modal-icon"><i class="fa fa-user-circle"></i></div>
      <h2>Join <em>Premier Chat</em></h2>
      <p>Choose a display name to start chatting.<br>Letters and numbers only.</p>
      <div class="modal-input-wrap">
        <i class="fa fa-user"></i>
        <input type="text" id="modalNameInput" class="modal-input"
               placeholder="e.g. Rahul123" maxlength="20"
               onkeydown="if(event.key==='Enter') confirmName()">
      </div>
      <span class="modal-hint"><i class="fa fa-info-circle"></i> No spaces, symbols or emojis. Max 20 chars.</span>
      <div class="modal-error" id="modalError"></div>
      <button class="modal-btn" onclick="confirmName()">
        <i class="fa fa-comments"></i> Enter Chat
      </button>
    </div>
  </div>

  <!-- TOPBAR -->
  <nav class="topbar">
    <div class="topbar-left">
      <a href="ban.html" class="icon-btn" title="Back">
        <i class="fa fa-arrow-left"></i>
      </a>
      <div class="topbar-brand">Premier<span>Chat</span></div>
      <div class="online-label">
        <span class="online-dot"></span> Live
      </div>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="themeBtn" title="Toggle theme">
        <i class="fa fa-moon" id="themeIcon"></i>
      </button>
      <button class="icon-btn" onclick="toggleNameBox()" title="Change name">
        <i class="fa fa-user-edit"></i>
      </button>
    </div>
  </nav>

  <!-- NAME CHANGE DROPDOWN -->
  <div class="name-dropdown" id="nameDropdown">
    <label><i class="fa fa-pen"></i> &nbsp;Change Name</label>
    <input type="text" id="newName" class="rx-input" placeholder="New name..." maxlength="20">
    <button class="rx-btn" onclick="updateName()">
      <i class="fa fa-save"></i> Save
    </button>
  </div>

  <!-- CHAT -->
  <div id="chatContainer"></div>

  <!-- FORM -->
  <form class="chat-form" id="chatForm">
    <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off">
    <button type="submit"><i class="fa fa-paper-plane"></i></button>
  </form>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    // ── THEME ──
    const root = document.documentElement;
    const themeIcon = document.getElementById('themeIcon');
    function applyTheme(t) {
      root.setAttribute('data-theme', t);
      themeIcon.className = t === 'dark' ? 'fa fa-sun' : 'fa fa-moon';
      localStorage.setItem('pi_theme', t);
    }
    applyTheme(localStorage.getItem('pi_theme') || 'light');
    document.getElementById('themeBtn').addEventListener('click', () => {
      applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    // ── TOAST ──
    let toastTimer;
    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.innerHTML = `<i class="fa fa-${isError ? 'exclamation-circle' : 'info-circle'}"></i> ${msg}`;
      t.className = 'toast show' + (isError ? ' error' : '');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ── CONFIG (unchanged) ──
    const BIN_ID     = "68d681d743b1c97be950e084";
    const MASTER_KEY = "$2a$10$5TyPwxtO8pS6G5qBROpTx.PX3NTZx3bg/W6cnelH2J5Qzyfz27ZA.";
    const API_URL    = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

    const BAD_WORDS = [
      "baap","🖕","f4ck","nigg@","fuck","shit","nigga",
      "madharchod","bhenchod","randi","chut","land",
      "mc","bc","sala","gaandu","bhosdike","chutiya",
      "harami","kamina","bastard","bitch","ass","damn"
    ];
    const FORBIDDEN_NAMES = ["prashant","prasanta","s4tyam","satyam","admin","system","moderation"];

    let username       = localStorage.getItem("chatUsername");
    let lastNameChange = localStorage.getItem("lastNameChange")
                         ? parseInt(localStorage.getItem("lastNameChange")) : null;

    // ── NAME MODAL ──
    function showModal() {
      document.getElementById('nameModal').classList.remove('hidden');
      setTimeout(() => document.getElementById('modalNameInput').focus(), 100);
    }
    function hideModal() {
      document.getElementById('nameModal').classList.add('hidden');
    }
    function setModalError(msg) {
      const el = document.getElementById('modalError');
      el.textContent = msg;
      el.classList.add('show');
    }
    function clearModalError() {
      document.getElementById('modalError').classList.remove('show');
    }

    function confirmName() {
      clearModalError();
      const val = document.getElementById('modalNameInput').value.trim();
      if (!val) { setModalError('Please enter a name.'); return; }
      if (!validateName(val)) {
        setModalError('Invalid name. Use only letters/numbers, no spaces or emojis. Forbidden names not allowed.');
        return;
      }
      username = val;
      localStorage.setItem('chatUsername', username);
      lastNameChange = Date.now();
      localStorage.setItem('lastNameChange', lastNameChange);
      hideModal();
      postSystemMessage(`${username} joined the chat`);
      loadMessages();
      setInterval(loadMessages, 5000);
    }

    // ── VALIDATE NAME (unchanged logic) ──
    function validateName(name) {
      if (!/^[A-Za-z0-9]+$/.test(name)) return false;
      if (FORBIDDEN_NAMES.includes(name.toLowerCase())) return false;
      return true;
    }

    // ── INIT ──
    function init() {
      if (!username) {
        showModal();
      } else {
        hideModal();
        loadMessages();
        setInterval(loadMessages, 5000);
      }
    }

    // ── LOAD (unchanged) ──
    async function loadMessages() {
      try {
        const res  = await fetch(API_URL, { headers: { "X-Master-Key": MASTER_KEY } });
        const data = await res.json();
        let msgs   = data.record.messages || [];
        const now  = Date.now();
        msgs = msgs.filter(m => (now - new Date(m.timestamp).getTime()) < 600000);
        if (msgs.length > 50) { countdownClear(); return; }
        renderMessages(msgs);
        await saveMessages(msgs);
      } catch(e) {
        showToast('Connection error.', true);
      }
    }

 // ── RENDER ──
    function renderMessages(msgs) {
      const box = document.getElementById('chatContainer');
      const wasBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 60;
      box.innerHTML = '';
      msgs.forEach(m => {
        const div = document.createElement('div');
        let cls = 'message';
        if (m.user === 'System')      cls += ' system';
        else if (m.user === 'Moderation') cls += ' moderation';
        else if (m.user === username) cls += ' self';
        div.className = cls;

        if (m.user === 'System' || m.user === 'Moderation') {
          div.innerHTML = `<span class="msg-text">${m.text}</span>`;
        } else {
          div.innerHTML = `
            <div class="meta">
              <i class="fa fa-user-circle"></i> ${m.user}
              &nbsp;·&nbsp;
              ${new Date(m.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}
            </div>
            <div class="msg-text">${m.text}</div>`;
        }
        box.appendChild(div);
      });
      if (wasBottom) box.scrollTop = box.scrollHeight;
    }

    // ── SAVE (unchanged) ──
    async function saveMessages(msgs) {
      await fetch(API_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
        body: JSON.stringify({ messages: msgs })
      });
    }

    // ── FILTER: clean message text ──
    function filterMessage(text) {
      let out = text;
      BAD_WORDS.forEach(bw => {
        const regex = new RegExp(bw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
        out = out.replace(regex, '*'.repeat(bw.length));
      });
      return out;
    }
    function containsBadWord(text) {
      return BAD_WORDS.some(bw => text.toLowerCase().includes(bw.toLowerCase()));
    }

    // ── SEND ──
    document.getElementById('chatForm').addEventListener('submit', async e => {
      e.preventDefault();
      if (!username) { showModal(); return; }
      let text = document.getElementById('msgInput').value.trim();
      if (!text) return;

      if (containsBadWord(text)) {
        // Filter the message instead of blocking — post cleaned version + moderation note
        const cleaned = filterMessage(text);
        await postModerationMessage('⚠️ A message was auto-filtered for inappropriate language.');
        text = cleaned;
      }

      try {
        const res  = await fetch(API_URL, { headers: { 'X-Master-Key': MASTER_KEY } });
        const data = await res.json();
        const msgs = data.record.messages || [];
        msgs.push({ user: username, text, timestamp: new Date().toISOString() });
        await saveMessages(msgs);
        document.getElementById('msgInput').value = '';
        loadMessages();
      } catch(e) {
        showToast('Failed to send message.', true);
      }
    });

    // ── SYSTEM ──
    async function postSystemMessage(txt) {
      try {
        const res  = await fetch(API_URL, { headers: { 'X-Master-Key': MASTER_KEY } });
        const data = await res.json();
        const msgs = data.record.messages || [];
        msgs.push({ user: 'System', text: txt, timestamp: new Date().toISOString() });
        await saveMessages(msgs);
      } catch(e) {}
    }

    // ── MODERATION ──
    async function postModerationMessage(txt) {
      try {
        const res  = await fetch(API_URL, { headers: { 'X-Master-Key': MASTER_KEY } });
        const data = await res.json();
        const msgs = data.record.messages || [];
        msgs.push({ user: 'Moderation', text: txt, timestamp: new Date().toISOString() });
        await saveMessages(msgs);
      } catch(e) {}
    }

    // ── CLEAR (unchanged) ──
    async function countdownClear() {
      for (let i = 3; i > 0; i--) {
        await postSystemMessage(`Clearing messages in ${i}...`);
        await new Promise(r => setTimeout(r, 1000));
      }
      await saveMessages([]);
      await postSystemMessage('Chat cleared.');
    }

    // ── NAME DROPDOWN ──
    function toggleNameBox() {
      document.getElementById('nameDropdown').classList.toggle('open');
    }
    document.addEventListener('click', e => {
      const dd  = document.getElementById('nameDropdown');
      const btn = e.target.closest('[onclick="toggleNameBox()"]');
      if (!btn && !dd.contains(e.target)) dd.classList.remove('open');
    });

    async function updateName() {
      const newName = document.getElementById('newName').value.trim();
      if (!newName) { showToast('Enter a name first.', true); return; }
      if (!validateName(newName)) {
        showToast('Invalid or forbidden name.', true); return;
      }
      if (lastNameChange && (Date.now() - lastNameChange) < 604800000) {
        showToast('Name can only be changed once per week!', true); return;
      }
      const old = username;
      username   = newName;
      localStorage.setItem('chatUsername', username);
      lastNameChange = Date.now();
      localStorage.setItem('lastNameChange', lastNameChange);
      await postSystemMessage(`${old} changed their name to ${username}`);
      document.getElementById('nameDropdown').classList.remove('open');
      document.getElementById('newName').value = '';
      showToast('Name updated!');
      loadMessages();
    }

    init();
  </script>
</body>
</html>
